<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office of the Organizing Secretary | Adamawa State Chapter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .sidebar-item:hover { background: #1e293b; color: #fbbf24; transform: translateX(5px); transition: 0.3s; }
        .active-lga { background: #1e293b !important; color: #fbbf24 !important; border-left: 4px solid #10b981; font-weight: 800; }
        .stat-card { transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <header class="bg-[#0f172a] text-white shadow-2xl sticky top-0 z-50 border-b-4 border-emerald-600">
        <div class="max-w-7xl mx-auto px-6 h-32 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <img src="logo.png" alt="Party Logo" class="w-20 h-20 object-contain bg-white p-1 rounded-xl shadow-md">
                <div>
                    <h1 class="text-2xl md:text-3xl font-black uppercase tracking-tighter leading-none">
                        Office of the <span class="text-emerald-400">Organizing Secretary</span>
                    </h1>
                    <h2 class="text-lg font-bold text-slate-300 uppercase tracking-widest mt-1">Adamawa State Chapter</h2>
                    <p id="live-clock" class="text-slate-500 text-[10px] font-mono font-bold tracking-widest uppercase mt-1"></p>
                </div>
            </div>

            <div class="flex items-center gap-4 bg-slate-800/50 p-3 rounded-2xl border border-slate-700 shadow-inner">
                <div class="text-right hidden md:block">
                    <p class="text-[9px] font-black text-emerald-400 uppercase tracking-widest mb-0.5">Organizing Secretary</p>
                    <p id="secretary-name" class="font-bold text-sm text-white capitalize"></p>
                </div>
                <img id="secretary-img" src="Prof_Mustapha_Atiku_Ribadu.jpg" 
                     class="w-16 h-16 rounded-xl object-cover border-2 border-emerald-500 shadow-lg">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="bg-white p-7 rounded-3xl shadow-sm border-t-4 border-blue-500 stat-card">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-widest text-center">Global Attendance</p>
                <h3 id="stat-ppl" class="text-4xl font-black text-slate-800 tracking-tighter text-center">0</h3>
            </div>
            <div class="bg-white p-7 rounded-3xl shadow-sm border-t-4 border-emerald-500 stat-card">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-widest text-center">Global Fleet</p>
                <h3 id="stat-cars" class="text-4xl font-black text-slate-800 tracking-tighter text-center">0</h3>
            </div>
            <div class="bg-white p-7 rounded-3xl shadow-sm border-t-4 border-amber-500 stat-card">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-widest text-center">Global Transport</p>
                <h3 id="stat-trans" class="text-3xl font-black text-slate-800 tracking-tighter text-center">₦0</h3>
            </div>
            <div class="bg-white p-7 rounded-3xl shadow-sm border-t-4 border-indigo-600 stat-card">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-widest text-center">Global Allowances</p>
                <h3 id="stat-allow" class="text-3xl font-black text-slate-800 tracking-tighter text-center">₦0</h3>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-10">
            <aside class="w-full lg:w-1/4">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-3 sticky top-40">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase px-4 mb-4 tracking-widest italic text-center">Select LGA</h4>
                    <div id="lga-menu" class="max-h-[500px] overflow-y-auto space-y-1 pr-2"></div>
                </div>
            </aside>

            <section class="w-full lg:w-3/4 min-h-[500px]">
                <div id="ward-header" class="hidden flex flex-row justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <div>
                        <h2 id="selected-lga-title" class="text-2xl font-black text-slate-900 uppercase italic tracking-tighter"></h2>
                        <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mt-1">LGA Mobilization Master Sheet</p>
                    </div>
                    <button id="admin-download" class="hidden bg-[#0f172a] text-white px-5 py-2 rounded-xl font-black text-[10px] uppercase hover:bg-emerald-600 transition shadow-lg flex items-center gap-2">
                        <span>📥</span> Export LGA List
                    </button>
                </div>

                <div id="pdf-content-wrapper">
                    <div id="ward-list" class="space-y-6">
                        <div class="text-center py-32 bg-white rounded-[40px] border-4 border-dashed border-slate-200">
                            <p class="text-slate-400 font-black uppercase tracking-tighter italic">Select an LGA to display personnel data</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTb8kwNqnDfxQvvnRPgXWmD767fIKr3KJVJ5jOO7JKx55PROrCRDsq4v5l2anv3-W9GLDpdjJl4gC5t/pub?gid=1624545584&single=true&output=csv'; // PASTE CSV LINK HERE
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === '2026';
        let masterData = [];

        function extractName() {
            const imgElement = document.getElementById('secretary-img');
            const fileName = imgElement.src.split('/').pop().split('.').shift(); 
            document.getElementById('secretary-name').innerText = fileName.replace(/_/g, ' ');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleString('en-NG').toUpperCase();
        }
        setInterval(updateClock, 1000); updateClock(); extractName();

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);

                masterData = rows.map(r => {
                    const c = r.split(',');
                    return {
                        lga: c[1]?.trim(), ward: c[2]?.trim(), name: c[3]?.trim(),
                        bank: c[4]?.trim(), acc: c[5]?.trim(),
                        ppl: parseInt(c[6]) || 0, allow: parseInt(c[7]) || 0,
                        cars: parseInt(c[8]) || 0, fee: parseInt(c[9]) || 0
                    };
                }).filter(r => r.lga && r.ward);

                if (masterData.length > 0) { updateDashboard(); renderLGAs(); }
            } catch (e) { console.error(e); }
        }

        function updateDashboard() {
            let p=0, c=0, t=0, a=0;
            masterData.forEach(d => {
                p += d.ppl; c += d.cars; t += (d.cars * d.fee); a += (d.ppl * d.allow);
            });
            document.getElementById('stat-ppl').innerText = p.toLocaleString();
            document.getElementById('stat-cars').innerText = c.toLocaleString();
            document.getElementById('stat-trans').innerText = '₦' + t.toLocaleString();
            document.getElementById('stat-allow').innerText = '₦' + a.toLocaleString();
        }

        function renderLGAs() {
            const lgas = [...new Set(masterData.map(r => r.lga))].sort();
            document.getElementById('lga-menu').innerHTML = lgas.map(lga => `
                <div onclick="showWards('${lga}', this)" class="sidebar-item px-5 py-3 rounded-xl cursor-pointer text-[11px] font-black uppercase tracking-tight text-slate-500">
                    ${lga}
                </div>
            `).join('');
        }

        function showWards(lgaName, el) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active-lga'));
            el.classList.add('active-lga');

            const filtered = masterData.filter(d => d.lga === lgaName);
            document.getElementById('ward-header').classList.remove('hidden');
            document.getElementById('selected-lga-title').innerText = lgaName;

            if (isAdmin) {
                document.getElementById('admin-download').classList.remove('hidden');
                document.getElementById('admin-download').onclick = () => exportPDF(lgaName);
            }

            document.getElementById('ward-list').innerHTML = filtered.map(w => `
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 flex flex-col gap-6 mb-4">
                    <div class="flex justify-between items-center border-b pb-4">
                        <h4 class="text-2xl font-black text-slate-900 tracking-tighter italic uppercase">${w.ward} Ward</h4>
                        <div class="text-right">
                             <p class="text-[8px] font-black text-emerald-600 uppercase tracking-widest leading-none">Rate Per Car</p>
                             <p class="text-xl font-black text-slate-900 tracking-tighter">₦${w.fee.toLocaleString()}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-blue-50/50 p-5 rounded-3xl border border-blue-100">
                            <p class="text-[8px] font-bold text-blue-400 uppercase mb-1">Total Attendance</p>
                            <p class="text-xl font-black text-blue-900">${w.ppl.toLocaleString()}</p>
                        </div>
                        <div class="bg-emerald-50/50 p-5 rounded-3xl border border-emerald-100">
                            <p class="text-[8px] font-bold text-emerald-500 uppercase mb-1">Total Fleet</p>
                            <p class="text-xl font-black text-emerald-900">${w.cars.toLocaleString()} Cars</p>
                        </div>
                        <div class="bg-amber-50/50 p-5 rounded-3xl border border-amber-100">
                            <p class="text-[8px] font-bold text-amber-600 uppercase mb-1">Transport Budget</p>
                            <p class="text-xl font-black text-amber-700">₦${(w.cars * w.fee).toLocaleString()}</p>
                        </div>
                        <div class="bg-indigo-50/50 p-5 rounded-3xl border border-indigo-100">
                            <p class="text-[8px] font-bold text-indigo-500 uppercase mb-1">Allowance Total</p>
                            <p class="text-xl font-black text-indigo-700">₦${(w.ppl * w.allow).toLocaleString()}</p>
                        </div>
                    </div>

                    ${isAdmin ? `
                    <div class="bg-slate-900 p-6 rounded-3xl text-white flex flex-col md:flex-row justify-between items-center">
                        <div class="text-center md:text-left">
                            <p class="text-[8px] text-emerald-400 font-bold uppercase tracking-widest mb-1 italic">Coordinator</p>
                            <p class="text-lg font-black uppercase">${w.name}</p>
                        </div>
                        <div class="md:text-right mt-4 md:mt-0 pt-4 md:pt-0 border-t md:border-0 border-slate-700">
                            <p class="text-[8px] text-emerald-400 font-bold uppercase tracking-widest mb-1 italic text-right">Bank Details</p>
                            <p class="text-lg font-black uppercase font-mono tracking-tighter text-emerald-100">${w.bank} • ${w.acc}</p>
                        </div>
                    </div>` : ''}
                </div>
            `).join('');
        }

        function exportPDF(lga) {
            const element = document.getElementById('pdf-content-wrapper'); 
            const opt = { 
                margin: 0.5, filename: `Report_${lga}.pdf`, image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } 
            };
            html2pdf().set(opt).from(element).save();
        }

        loadData();
    </script>
</body>
</html>
